name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-notes:
    name: Create Release Notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::Version ${VERSION} not found in CHANGELOG.md — add a [${VERSION}] section before tagging"
            exit 1
          fi

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: md-serve-release-notes
          path: release-notes.md

  build-jar:
    name: Build Uber JAR
    needs: [release-notes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build uber JAR
        run: ./mvnw -B package -Dquarkus.package.jar.type=uber-jar -DskipTests

      - name: Upload uber JAR
        uses: actions/upload-artifact@v4
        with:
          name: md-serve-uber-jar
          path: target/*-runner.jar

  release:
    name: Create GitHub Release
    needs: [build-jar, release-notes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          cp artifacts/md-serve-uber-jar/*-runner.jar md-serve.jar

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "md-serve ${{ github.ref_name }}" \
            --notes-file artifacts/md-serve-release-notes/release-notes.md \
            md-serve.jar
